jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: mtfoley/pr-compliance-action@11b664f0fcf2c4ce954f05ccfcaab6e52b529f86 # main
        with:
          body-auto-close: false
          ignore-authors: |-
            allcontributors
            allcontributors[bot]
            renovate
            renovate[bot]
          ignore-team-members: false

name: Compliance

on:
  pull_request:
    branches:
      - main
    types:
      - edited
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: write
