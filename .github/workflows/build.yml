jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/prepare
      - run: pnpm build
      - run: pnpm link .
      - run: pnpm typestat

name: Build

on:
  pull_request: ~
  push:
    branches:
      - main
